steps:
  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/lediary/api:$COMMIT_SHA'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/lediary/api:latest'
      - '-f'
      - 'api/Dockerfile'
      - 'api'
    id: 'build-api'

  # Push API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/lediary/api']
    id: 'push-api'
    waitFor: ['build-api']

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'lediary-api'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/lediary/api:$COMMIT_SHA'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,CORS_ORIGIN=https://lediary.web.app'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
    id: 'deploy-api'
    waitFor: ['push-api']

options:
  logging: CLOUD_LOGGING_ONLY
