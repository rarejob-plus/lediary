services:
  ui:
    build:
      context: web
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lediary-ui.rule=Host(`lediary.localhost`)"
      - "traefik.http.services.lediary-ui.loadbalancer.server.port=80"
    depends_on:
      - api
    networks:
      - traefik-shared
      - default

  api:
    build:
      context: api
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lediary-api.rule=Host(`api.lediary.localhost`)"
      - "traefik.http.services.lediary-api.loadbalancer.server.port=8080"
    environment:
      - PORT=8080
      - CORS_ORIGIN=${CORS_ORIGIN:-http://lediary.localhost}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_CLOUD_PROJECT=otokichi-app
      - FIRESTORE_EMULATOR_HOST=${FIRESTORE_EMULATOR_HOST:-}
    networks:
      - traefik-shared
      - default

networks:
  traefik-shared:
    external: true
  default: {}
